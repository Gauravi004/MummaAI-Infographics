<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 0 to Deployment</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0f1117;--bg-card:#1a1d27;--bg-card2:#1e2130;--bg-hover:#252838;
  --orange:#f59e0b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --cream:#e8e3d5;--muted:#8b8fa8;--dim:#5a5e72;
  --border:#2a2d3e;--border-l:#333650;
}
html,body{min-height:100vh;background:var(--bg-deep);color:var(--cream);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.6}
body{background:radial-gradient(ellipse at 20% 20%,#1a1f35 0%,#0f1117 60%);display:flex;align-items:center;justify-content:center;padding:1.5rem;min-height:100vh}
#app{width:100%;max-width:720px}
.screen{display:none}
.screen.active{display:block;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes spin{to{transform:rotate(360deg)}}

.start-wrap{text-align:center;padding:3rem 2rem;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,0.4)}
.badge{display:inline-block;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);color:var(--orange);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:1.5rem}
.start-title{font-size:clamp(24px,5vw,36px);font-weight:600;letter-spacing:-0.5px;line-height:1.2;margin-bottom:0.75rem}
.start-title span{color:var(--orange)}
.start-sub{color:var(--muted);font-size:14px;max-width:420px;margin:0 auto 2.5rem;line-height:1.7}
.start-meta{display:flex;justify-content:center;gap:2rem;margin-bottom:2.5rem}
.meta-val{font-size:20px;font-weight:600;color:var(--orange);display:block}
.meta-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em}

.btn-primary{background:var(--orange);color:#1a1200;border:none;padding:13px 36px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;box-shadow:0 4px 20px rgba(245,158,11,0.25);letter-spacing:0.01em}
.btn-primary:hover{background:#fbbf24;box-shadow:0 6px 28px rgba(245,158,11,0.4);transform:translateY(-1px)}
.btn-secondary{background:transparent;border:1px solid var(--border-l);color:var(--cream);padding:10px 24px;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-left:10px}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--orange)}

.stage-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.stage-lbl{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--orange)}
.step-dots{display:flex;gap:5px}
.dot{width:28px;height:4px;border-radius:2px;background:var(--border-l);transition:background 0.3s}
.dot.done{background:var(--green)}
.dot.active{background:var(--orange)}

.health-bar{display:flex;align-items:center;gap:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:1rem}
.health-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);white-space:nowrap;flex-shrink:0}
.health-track{flex:1;height:6px;background:var(--border-l);border-radius:3px;overflow:hidden}
.health-fill{height:100%;border-radius:3px;transition:width 0.6s ease,background 0.6s ease;background:var(--green)}
.health-pct{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace;min-width:36px;text-align:right;flex-shrink:0}

.log-panel{background:#0d0f18;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:1rem;font-family:'JetBrains Mono',monospace;font-size:11.5px;max-height:110px;overflow:hidden}
.log-ok{color:#4ade80}.log-warn{color:var(--yellow)}.log-err{color:var(--red)}.log-info{color:#60a5fa}.log-dim{color:var(--dim)}

.stage-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1rem;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.sc-title{font-size:17px;font-weight:600;letter-spacing:-0.2px;margin-bottom:0.6rem}
.sc-body{font-size:13.5px;color:var(--muted);line-height:1.7;margin-bottom:1.5rem}
.sc-body b{color:var(--cream);font-weight:500}
.microcopy{font-size:11.5px;color:var(--dim);font-style:italic;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.microcopy::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--orange);opacity:0.6;animation:pulse 2s ease-in-out infinite;flex-shrink:0}

.choices-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);margin-bottom:10px}
.btn-choice{width:100%;text-align:left;background:var(--bg-card2);border:1px solid var(--border-l);color:var(--cream);padding:14px 18px;border-radius:12px;font-size:13.5px;cursor:pointer;transition:all 0.2s;font-family:inherit;line-height:1.5;display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.btn-choice:hover{background:var(--bg-hover);border-color:var(--orange);box-shadow:0 0 0 1px rgba(245,158,11,0.2);transform:translateX(2px)}
.btn-choice:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.choice-key{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.25);color:var(--orange);font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;flex-shrink:0;margin-top:2px;font-family:'JetBrains Mono',monospace}

.feedback{border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:1rem;line-height:1.6;display:none}
.feedback.ok{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:#86efac;display:block}
.feedback.warn{background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.25);color:#fde047;display:block}
.feedback.err{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;display:block}

.reacting{text-align:center;padding:2rem;color:var(--muted);font-size:13px;letter-spacing:0.04em}
.spinner{width:28px;height:28px;border:2px solid var(--border-l);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}

.ending-wrap{text-align:center;padding:2.5rem 2rem;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,0.4)}
.end-icon{font-size:52px;margin-bottom:1rem;display:block}
.end-title{font-size:22px;font-weight:600;margin-bottom:0.75rem;letter-spacing:-0.3px}
.end-body{font-size:14px;color:var(--muted);max-width:400px;margin:0 auto 2rem;line-height:1.75}
.end-stats{display:flex;justify-content:center;gap:2rem;margin-bottom:2rem}
.stat-val{font-size:20px;font-weight:600;display:block}
.stat-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em}
.end-crash .end-title{color:var(--red)}
.end-risky .end-title{color:var(--yellow)}
.end-stable .end-title{color:var(--green)}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">

<div id="screen-start" class="screen active">
  <div class="start-wrap">
    <div class="badge">Interactive Simulation</div>
    <h1 class="start-title">Day 0 to <span>Deployment</span></h1>
    <p class="start-sub">A DevOps survival experience. You are the engineer. Every decision matters. The system is watching.</p>
    <div class="start-meta">
      <div><span class="meta-val">6</span><span class="meta-lbl">Stages</span></div>
      <div><span class="meta-val">3</span><span class="meta-lbl">Endings</span></div>
      <div><span class="meta-val">~8min</span><span class="meta-lbl">To complete</span></div>
    </div>
    <button class="btn-primary" id="startBtn">Begin the sprint &rarr;</button>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="stage-header">
    <div class="stage-lbl" id="stageLbl">Stage 1</div>
    <div class="step-dots" id="stepDots"></div>
  </div>
  <div class="health-bar">
    <span class="health-lbl">System Health</span>
    <div class="health-track"><div class="health-fill" id="healthFill" style="width:100%"></div></div>
    <span class="health-pct" id="healthPct">100%</span>
  </div>
  <div class="log-panel" id="logPanel"></div>
  <div class="stage-card">
    <div class="sc-title" id="scTitle"></div>
    <div class="sc-body" id="scBody"></div>
    <div class="microcopy" id="scMicro"></div>
    <div class="feedback" id="feedback"></div>
    <div class="choices-lbl">Take a decision</div>
    <div id="choices"></div>
  </div>
</div>

<div id="screen-end" class="screen">
  <div class="ending-wrap" id="endingWrap">
    <span class="end-icon" id="endIcon"></span>
    <div class="end-title" id="endTitle"></div>
    <div class="end-body" id="endBody"></div>
    <div class="end-stats">
      <div><span class="stat-val" id="endHealth">-</span><span class="stat-lbl">Final health</span></div>
      <div><span class="stat-val" id="endDecisions" style="color:var(--orange)">-</span><span class="stat-lbl">Decisions</span></div>
      <div><span class="stat-val" id="endResult" style="color:var(--muted)">-</span><span class="stat-lbl">Outcome</span></div>
    </div>
    <button class="btn-primary" id="restartBtn">Run another sprint</button>
    <button class="btn-secondary" id="retryBtn">Try a different path</button>
  </div>
</div>

</div>
<script>
(function() {
  var stages = [
    {
      label: "Stage 1 — Sprint Planning",
      title: "The sprint kickoff meeting",
      body: "It's Monday morning. The product manager has just dropped <b>17 new user stories</b> into the backlog. Your team of 4 has a 2-week sprint. There is already technical debt from the last iteration. The team looks at you.",
      micro: "Team is waiting for your call...",
      logs: [
        { t: "info", m: "Sprint planning session started" },
        { t: "ok",   m: "Team assembled: 4 engineers online" },
        { t: "warn", m: "Backlog contains 17 unestimated stories" }
      ],
      choices: [
        { text: "Commit to all 17 stories. Ship everything this sprint.", delta: -30, type: "err", fb: "The team is overwhelmed before you've written a line of code. Morale drops, estimates break down. Technical debt incoming." },
        { text: "Prioritise the top 6 stories with the team. Park the rest.", delta: 0,   type: "ok",   fb: "Clean backlog. Realistic scope. The team has breathing room and a clear goal. Good start." },
        { text: "Let the PM decide what to cut. Avoid the conflict.",        delta: -15, type: "warn", fb: "Ownership gap from day one. The team has no buy-in on scope. This will cause friction later." }
      ]
    },
    {
      label: "Stage 2 — Coding Phase",
      title: "A critical bug appears on dev branch",
      body: "Day 4. Midway through the sprint. A teammate just pushed code that <b>breaks the authentication module</b>. CI is failing. Two engineers are blocked. The deadline does not move.",
      micro: "Pressure is building... think carefully.",
      logs: [
        { t: "err",  m: "Build #47 FAILED — auth.service line 84" },
        { t: "warn", m: "2 engineers blocked on downstream tasks" },
        { t: "info", m: "Pull request #31 awaiting review" }
      ],
      choices: [
        { text: "Skip the PR review. Merge directly to unblock the team.", delta: -25, type: "err",  fb: "The bug ships to the next stage. You bought time now but borrowed it from future-you." },
        { text: "Pair programme with the author to fix it. 2 hours.",        delta: 5,   type: "ok",   fb: "Collaborative fix, knowledge shared, root cause understood. The team is back on track." },
        { text: "Reassign the broken module to the most senior engineer.",   delta: -10, type: "warn", fb: "Short-term fix. The original author learns nothing. Similar bug risk next sprint." }
      ]
    },
    {
      label: "Stage 3 — CI/CD Pipeline",
      title: "The pipeline takes 47 minutes per build",
      body: "Your Jenkins pipeline runs end-to-end tests on every commit. It works — but it is <b>47 minutes per build</b>. Engineers are context-switching constantly while waiting. Productivity is fragmenting.",
      micro: "Logs are updating... the pipeline is watching.",
      logs: [
        { t: "warn", m: "Build time: 47m 12s (threshold: 15m)" },
        { t: "info", m: "340 test cases running sequentially" },
        { t: "ok",   m: "Coverage: 84% — no regressions detected" }
      ],
      choices: [
        { text: "Parallelise the test suite. Split into 4 concurrent runners.",  delta: 10,  type: "ok",   fb: "Build time drops to 13 minutes. Engineers stay in flow. Pipeline is now a feature, not a bottleneck." },
        { text: "Remove the slower integration tests to speed things up.",        delta: -20, type: "err",  fb: "Builds are fast now, but three integration bugs slip through in the next fortnight. False economy." },
        { text: "Leave it. The tests are passing, that is what matters.",         delta: -10, type: "warn", fb: "Technically correct. Practically damaging. Slow feedback loops compound daily across the whole team." }
      ]
    },
    {
      label: "Stage 4 — Pre-Deployment",
      title: "Staging looks different to production",
      body: "You are ready to deploy. During final staging checks you notice <b>environment configs do not match production</b>. Database versions differ. A junior dev says it should be fine.",
      micro: "Think carefully before you proceed...",
      logs: [
        { t: "warn", m: "DB version: staging=14.2 production=13.8" },
        { t: "info", m: "Config drift detected in 3 environment vars" },
        { t: "ok",   m: "All unit tests passing on staging" }
      ],
      choices: [
        { text: "Deploy anyway. The unit tests all pass on staging.",             delta: -30, type: "err",  fb: "Config drift causes a data migration error in production. Partial rollback required. Users affected." },
        { text: "Halt deployment. Fix environment parity first.",                 delta: 10,  type: "ok",   fb: "One-day delay. Clean environments. Deployment proceeds without incident. Mature call." },
        { text: "Deploy to 5% of users only. Monitor before full rollout.",       delta: 0,   type: "warn", fb: "Canary approach. Sensible risk management. The bug surfaces in the 5% but impact is contained." }
      ]
    },
    {
      label: "Stage 5 — Deployment",
      title: "Go time. The release button is in front of you.",
      body: "The sprint is done. Code reviewed, tests green, environments aligned. It is <b>5:47pm on a Friday</b>. The PM wants this live before the weekend for a marketing announcement.",
      micro: "The team is watching the screen...",
      logs: [
        { t: "ok",   m: "All 6 stories complete and reviewed" },
        { t: "ok",   m: "Staging sign-off received" },
        { t: "warn", m: "Deployment window: Friday 17:47 UTC" }
      ],
      choices: [
        { text: "Deploy now. Marketing is ready, team is ready, ship it.",                          delta: -15, type: "warn", fb: "Friday deploys are high risk. Limited on-call coverage if something goes wrong. It works this time. Just." },
        { text: "Push back to Monday morning. Safer window, full team available.",                  delta: 10,  type: "ok",   fb: "The PM is frustrated but understands. Monday deploy goes smoothly. Professionalism over pressure." },
        { text: "Deploy with an automated rollback trigger if error rate spikes.",                  delta: 5,   type: "ok",   fb: "Engineering solution to a process problem. Smart. The rollback is not triggered, but it was there." }
      ]
    },
    {
      label: "Stage 6 — Monitoring",
      title: "Alerts firing at 2am. You are on-call.",
      body: "Three days post-deployment. It is 2:09am. Your phone wakes you. <b>CPU on 2 of 5 nodes is at 94%.</b> Response times are climbing. Users have not noticed yet, but the window is narrow.",
      micro: "Logs are updating... system is reacting...",
      logs: [
        { t: "err",  m: "ALERT: node-03 CPU 94% — threshold 80%" },
        { t: "err",  m: "ALERT: node-05 CPU 91% — latency +340ms" },
        { t: "warn", m: "Active users: 847 — peak in 4 hours" }
      ],
      choices: [
        { text: "Restart the affected nodes immediately to clear the load.",         delta: -20, type: "err",  fb: "Restarting under load causes a 4-minute outage. Users notice. The underlying issue is untouched." },
        { text: "Scale horizontally. Spin up 3 additional nodes via auto-scaling.",  delta: 10,  type: "ok",   fb: "Load distributes. CPU drops to 61%. You find the memory leak in the morning with fresh eyes." },
        { text: "Wake the senior engineer. Not confident handling this alone.",      delta: -5,  type: "warn", fb: "Responsible call. Better to escalate than guess under pressure. System stabilises with two sets of eyes." }
      ]
    }
  ];

  var health = 100;
  var currentStage = 0;
  var decisions = 0;
  var logLines = [];

  function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) {
      screens[i].classList.remove('active');
    }
    document.getElementById(id).classList.add('active');
  }

  function addLog(type, msg) {
    var d = new Date();
    var ts = ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2) + ':' + ('0'+d.getSeconds()).slice(-2);
    logLines.push({ t: type, m: '[' + ts + '] ' + msg });
    renderLogs();
  }

  function renderLogs() {
    var panel = document.getElementById('logPanel');
    var recent = logLines.slice(-5);
    var html = '';
    for (var i = 0; i < recent.length; i++) {
      var l = recent[i];
      var cls = 'log-' + l.t;
      html += '<div class="' + cls + '">' + l.m + '</div>';
    }
    panel.innerHTML = html;
  }

  function renderHealth() {
    var clamped = Math.max(0, Math.min(100, health));
    var fill = document.getElementById('healthFill');
    fill.style.width = clamped + '%';
    if (clamped > 65) fill.style.background = '#22c55e';
    else if (clamped > 35) fill.style.background = '#eab308';
    else fill.style.background = '#ef4444';
    document.getElementById('healthPct').textContent = clamped + '%';
  }

  function renderDots() {
    var wrap = document.getElementById('stepDots');
    var html = '';
    for (var i = 0; i < stages.length; i++) {
      var cls = 'dot';
      if (i < currentStage) cls += ' done';
      else if (i === currentStage) cls += ' active';
      html += '<div class="' + cls + '"></div>';
    }
    wrap.innerHTML = html;
  }

  function renderStage() {
    if (currentStage >= stages.length) { showEnding(); return; }
    var s = stages[currentStage];
    document.getElementById('stageLbl').textContent = s.label;
    document.getElementById('scTitle').textContent = s.title;
    document.getElementById('scBody').innerHTML = s.body;
    document.getElementById('scMicro').textContent = s.micro;
    var fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.textContent = '';
    for (var i = 0; i < s.logs.length; i++) {
      addLog(s.logs[i].t, s.logs[i].m);
    }
    renderHealth();
    renderDots();
    var keys = ['A','B','C'];
    var html = '';
    for (var j = 0; j < s.choices.length; j++) {
      html += '<button class="btn-choice" data-idx="' + j + '"><span class="choice-key">' + keys[j] + '</span><span>' + s.choices[j].text + '</span></button>';
    }
    document.getElementById('choices').innerHTML = html;
    var btns = document.querySelectorAll('.btn-choice');
    for (var k = 0; k < btns.length; k++) {
      btns[k].addEventListener('click', handleChoice);
    }
  }

  function handleChoice(e) {
    var btn = e.currentTarget;
    var idx = parseInt(btn.getAttribute('data-idx'), 10);
    var s = stages[currentStage];
    var c = s.choices[idx];
    decisions++;
    health = Math.max(0, Math.min(100, health + c.delta));
    var allBtns = document.querySelectorAll('.btn-choice');
    for (var i = 0; i < allBtns.length; i++) {
      allBtns[i].disabled = true;
    }
    var fb = document.getElementById('feedback');
    fb.className = 'feedback ' + c.type;
    fb.textContent = c.fb;
    addLog(c.type === 'ok' ? 'ok' : c.type === 'err' ? 'err' : 'warn',
      c.type === 'ok' ? 'Decision logged — system stable' :
      c.type === 'err' ? 'Decision logged — health impact detected' :
      'Decision logged — monitoring closely');
    renderHealth();
    if (health <= 0) {
      setTimeout(showEnding, 1800);
      return;
    }
    setTimeout(function() {
      currentStage++;
      renderStage();
    }, 2200);
  }

  function showEnding() {
    showScreen('screen-end');
    var type;
    if (health <= 20) type = 'crash';
    else if (health <= 55) type = 'risky';
    else type = 'stable';
    var wrap = document.getElementById('endingWrap');
    wrap.className = 'ending-wrap end-' + type;
    var data = {
      crash: { icon: '🌧', title: 'System failure',      body: "Things didn't go as planned. The system went down, alerts fired, and the team had a long night. But every incident is a learning. Write the postmortem. It gets better.", result: 'Incident' },
      risky: { icon: '⚡',  title: 'Risky success',       body: "It worked... but there are concerns. The deployment is live, but fragile. Some decisions left the system exposed. Technical debt is real.",                            result: 'Unstable' },
      stable:{ icon: '☀️', title: 'Stable deployment',   body: "Well done. The system is stable and performing smoothly. The team trusted your decisions, the pipeline held, and users noticed nothing — which is exactly how it should feel.", result: 'Healthy' }
    };
    var d = data[type];
    document.getElementById('endIcon').textContent = d.icon;
    document.getElementById('endTitle').textContent = d.title;
    document.getElementById('endBody').textContent = d.body;
    document.getElementById('endDecisions').textContent = decisions;
    document.getElementById('endResult').textContent = d.result;
    var hEl = document.getElementById('endHealth');
    hEl.textContent = Math.max(0, health) + '%';
    hEl.style.color = health > 65 ? '#22c55e' : health > 35 ? '#eab308' : '#ef4444';
  }

  function startGame() {
    health = 100;
    currentStage = 0;
    decisions = 0;
    logLines = [
      { t: 'info', m: '[00:00:00] Session initialised' },
      { t: 'ok',   m: '[00:00:01] Environment loaded' }
    ];
    showScreen('screen-game');
    renderLogs();
    renderStage();
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', startGame);
})();
</script>
</body>
</html>
